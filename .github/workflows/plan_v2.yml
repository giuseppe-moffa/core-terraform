# Model 2: envs/<environment_key>/<environment_slug>. Supports deploy/<key>/<slug> and request/<id> branches.
name: Terraform Plan (v2)

on:
  workflow_dispatch:
    inputs:
      request_id:
        description: "TfPilot request ID (optional; empty = full env plan for deploy branches)"
        required: false
        type: string
      environment_key:
        description: "Environment key (dev or prod)"
        required: true
        type: choice
        options:
          - dev
          - prod
      environment_slug:
        description: "Environment slug (e.g. ai-agent)"
        required: true
        type: string
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.event_name == 'workflow_dispatch' && format('core-terraform-{0}-{1}-{2}', inputs.environment_key, inputs.environment_slug, inputs.request_id || 'deploy') || format('core-terraform-pr-{0}', github.head_ref) }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  resolve-env:
    runs-on: ubuntu-latest
    outputs:
      environment_key: ${{ steps.out.outputs.environment_key }}
      environment_slug: ${{ steps.out.outputs.environment_slug }}
      request_id: ${{ steps.out.outputs.request_id }}
      skip: ${{ steps.out.outputs.skip }}
    steps:
      - name: Checkout (for PR env resolution)
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          fetch-depth: 500

      - name: Resolve environment
        id: out
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment_key=${{ inputs.environment_key }}" >> $GITHUB_OUTPUT
            echo "environment_slug=${{ inputs.environment_slug }}" >> $GITHUB_OUTPUT
            echo "request_id=${{ inputs.request_id || '' }}" >> $GITHUB_OUTPUT
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            REF="${{ github.head_ref }}"
            if [[ "$REF" =~ ^deploy/([^/]+)/(.+)$ ]]; then
              echo "environment_key=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
              echo "environment_slug=${BASH_REMATCH[2]}" >> $GITHUB_OUTPUT
              echo "request_id=" >> $GITHUB_OUTPUT
              echo "skip=false" >> $GITHUB_OUTPUT
            elif [[ "$REF" =~ ^request/(.+)$ ]]; then
              echo "request_id=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
              git fetch origin ${{ github.base_ref }} --depth=500 2>/dev/null || true
              FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD 2>/dev/null || true)
              ENV_ROOTS=$(echo "$FILES" | grep -oE '^envs/([^/]+)/([^/]+)/' | sort -u)
              ENV_COUNT=$(echo "$ENV_ROOTS" | grep -c . || echo 0)
              if [ "$ENV_COUNT" -gt 1 ]; then
                echo "::error::PR changes multiple env roots (found $ENV_COUNT); expect exactly one env per request branch"
                exit 1
              fi
              if [ -z "$ENV_ROOTS" ]; then
                echo "::error::Could not determine env from PR changed files (expect envs/<key>/<slug>/ in path)"
                exit 1
              fi
              ENV_LINE=$(echo "$ENV_ROOTS" | head -1)
              KEY=$(echo "$ENV_LINE" | cut -d/ -f2)
              SLUG=$(echo "$ENV_LINE" | cut -d/ -f3)
              echo "environment_key=$KEY" >> $GITHUB_OUTPUT
              echo "environment_slug=$SLUG" >> $GITHUB_OUTPUT
              echo "skip=false" >> $GITHUB_OUTPUT
            else
              echo "environment_key=" >> $GITHUB_OUTPUT
              echo "environment_slug=" >> $GITHUB_OUTPUT
              echo "request_id=" >> $GITHUB_OUTPUT
              echo "skip=true" >> $GITHUB_OUTPUT
            fi
          fi

  plan:
    needs: resolve-env
    if: needs.resolve-env.outputs.skip != 'true'
    runs-on: ubuntu-latest
    env:
      ENV_ROOT: envs/${{ needs.resolve-env.outputs.environment_key }}/${{ needs.resolve-env.outputs.environment_slug }}
    defaults:
      run:
        working-directory: ${{ env.ENV_ROOT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::420259807324:role/tfplan-connector
          aws-region: eu-west-2
          role-session-name: tfplan-plan-v2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Debug AWS identity and context
        run: |
          set -euxo pipefail
          aws sts get-caller-identity
          aws configure get region || true
          echo "TF_WORKING_DIR=$(pwd)"
          terraform version
          pwd
          ls -la

      - name: Terraform Init
        run: |
          set -euxo pipefail
          terraform init -input=false \
            -backend-config="bucket=tfpilot-tfstate-core-${{ needs.resolve-env.outputs.environment_key }}" \
            -backend-config="key=${{ needs.resolve-env.outputs.environment_slug }}/terraform.tfstate" \
            -backend-config="region=eu-west-2" \
            -backend-config="dynamodb_table=tfpilot-tfstate-lock-core-${{ needs.resolve-env.outputs.environment_key }}" \
            -backend-config="encrypt=true"

      - name: Terraform Plan
        run: |
          set -euxo pipefail
          REQUEST_ID="${{ needs.resolve-env.outputs.request_id }}"
          TARGET_ARG=""
          if [ -n "$REQUEST_ID" ]; then
            MODULE_NAME="tfpilot_$(echo "$REQUEST_ID" | sed 's/[^a-zA-Z0-9_]/_/g')"
            TARGET_ARG="-target=module.${MODULE_NAME}"
          fi
          terraform plan -input=false -no-color -lock=false $TARGET_ARG -out=tfplan.binary | tee plan.txt
          terraform show -json tfplan.binary > plan.json

      - name: Upload plan logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plan-logs-v2
          path: |
            ${{ env.ENV_ROOT }}/plan.txt
            ${{ env.ENV_ROOT }}/plan.json
            ${{ env.ENV_ROOT }}/.terraform.lock.hcl

  infracost:
    name: Infracost cost estimation
    runs-on: ubuntu-latest
    needs: [resolve-env, plan]
    if: needs.resolve-env.outputs.skip != 'true' && needs.plan.result == 'success'
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    env:
      ENV_ROOT: envs/${{ needs.resolve-env.outputs.environment_key }}/${{ needs.resolve-env.outputs.environment_slug }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Terraform file changes
        id: tf-changes
        run: |
          git fetch origin main --depth=500 2>/dev/null || git fetch origin master --depth=500 2>/dev/null || true
          BASE=origin/main
          git show-ref -q refs/remotes/origin/main || BASE=origin/master
          set +e
          OUT=$(git diff --name-only $BASE...HEAD -- '**/*.tf' '**/*.tfvars' '**/*.tfvars.json' 2>/dev/null)
          DIFF_EXIT=$?
          if [ $DIFF_EXIT -ne 0 ]; then
            git fetch origin main 2>/dev/null || git fetch origin master 2>/dev/null || true
            OUT=$(git diff --name-only $BASE...HEAD -- '**/*.tf' '**/*.tfvars' '**/*.tfvars.json' 2>/dev/null)
            DIFF_EXIT=$?
          fi
          set -e
          if [ $DIFF_EXIT -ne 0 ] || echo "$OUT" | grep -q .; then
            echo "has_tf_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_tf_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Infracost
        if: steps.tf-changes.outputs.has_tf_changes == 'true'
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Download plan artifact
        if: steps.tf-changes.outputs.has_tf_changes == 'true'
        uses: actions/download-artifact@v4
        with:
          name: plan-logs-v2

      - name: Generate Infracost cost JSON
        if: steps.tf-changes.outputs.has_tf_changes == 'true'
        run: |
          PLAN_JSON="${{ env.ENV_ROOT }}/plan.json"
          if [ -f "$PLAN_JSON" ]; then
            infracost breakdown --path="$PLAN_JSON" --format=json --out-file=infracost-cost.json
          else
            echo "::warning::Plan JSON not found at $PLAN_JSON"
            find . -name "plan.json" 2>/dev/null || true
            exit 1
          fi

      - name: Generate Infracost diff JSON
        if: steps.tf-changes.outputs.has_tf_changes == 'true'
        run: |
          PLAN_JSON="${{ env.ENV_ROOT }}/plan.json"
          infracost diff --path="$PLAN_JSON" --format=json --out-file=infracost-diff.json

      - name: Upload Infracost artifacts
        if: steps.tf-changes.outputs.has_tf_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: infracost-cost.json
          path: infracost-cost.json

      - name: Upload Infracost diff artifact
        if: steps.tf-changes.outputs.has_tf_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: infracost-diff.json
          path: infracost-diff.json

      - name: Configure AWS credentials (for S3 upload)
        if: steps.tf-changes.outputs.has_tf_changes == 'true' && needs.resolve-env.outputs.request_id != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::420259807324:role/tfplan-connector
          aws-region: eu-west-2
          role-session-name: tfplan-infracost-s3

      - name: Upload Infracost results to S3
        if: steps.tf-changes.outputs.has_tf_changes == 'true' && needs.resolve-env.outputs.request_id != ''
        env:
          REQUEST_ID: ${{ needs.resolve-env.outputs.request_id }}
          REQUESTS_BUCKET: ${{ vars.TFPILOT_REQUESTS_BUCKET || 'tfpilot-requests' }}
        run: |
          if [ -z "$REQUEST_ID" ]; then exit 0; fi
          if [ ! -f infracost-cost.json ] || [ ! -f infracost-diff.json ]; then
            echo "Infracost JSON files not found, skipping S3 upload"
            exit 0
          fi
          aws s3 cp infracost-cost.json "s3://${REQUESTS_BUCKET}/cost/${REQUEST_ID}/infracost-cost.json" --content-type "application/json"
          aws s3 cp infracost-diff.json "s3://${REQUESTS_BUCKET}/cost/${REQUEST_ID}/infracost-diff.json" --content-type "application/json"
          echo "Uploaded cost artifacts to s3://${REQUESTS_BUCKET}/cost/${REQUEST_ID}/"

      - name: Get PR number
        if: steps.tf-changes.outputs.has_tf_changes == 'true'
        id: pr
        run: |
          PR_NUM=$(gh pr list --head "${{ github.head_ref || github.ref_name }}" --state open --json number -q '.[0].number' 2>/dev/null || echo "")
          echo "number=${PR_NUM}" >> $GITHUB_OUTPUT
          echo "PR number: ${PR_NUM}"

      - name: Post Infracost PR comment
        if: steps.tf-changes.outputs.has_tf_changes == 'true' && steps.pr.outputs.number != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          infracost comment github --path=infracost-diff.json \
            --repo=${{ github.repository }} \
            --github-token="$GITHUB_TOKEN" \
            --pull-request=${{ steps.pr.outputs.number }} \
            --behavior=update
