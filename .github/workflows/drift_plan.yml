# Model 2: envs/<workspace_key>/<workspace_slug>. Supports deploy/<key>/<slug> branches (ENV_ROOT).
name: Drift Plan (v2)

on:
  workflow_dispatch:
    inputs:
      workspace_key:
        description: "Workspace key (dev or prod)"
        required: true
        type: choice
        options:
          - dev
          - prod
      workspace_slug:
        description: "Workspace slug (e.g. ai-agent)"
        required: true
        type: string

concurrency:
  group: core-terraform-state-${{ inputs.workspace_key }}-${{ inputs.workspace_slug }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  drift-plan:
    runs-on: ubuntu-latest
    environment: ${{ inputs.workspace_key == 'prod' && 'production' || 'nonprod' }}
    env:
      ENV_ROOT: envs/${{ inputs.workspace_key }}/${{ inputs.workspace_slug }}
    defaults:
      run:
        working-directory: ${{ env.ENV_ROOT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::420259807324:role/tfplan-connector
          aws-region: eu-west-2
          role-session-name: tfplan-drift-v2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          set -euxo pipefail
          terraform init -input=false \
            -backend-config="bucket=tfpilot-tfstate-core-${{ inputs.workspace_key }}" \
            -backend-config="key=${{ inputs.workspace_slug }}/terraform.tfstate" \
            -backend-config="region=eu-west-2" \
            -backend-config="dynamodb_table=tfpilot-tfstate-lock-core-${{ inputs.workspace_key }}" \
            -backend-config="encrypt=true"

      - name: Terraform Plan (Drift Detection)
        id: plan
        continue-on-error: true
        run: |
          set +e
          terraform plan -input=false -no-color -lock=false -detailed-exitcode -out=plan.out | tee plan.txt
          PLAN_EXIT=$?
          echo "plan_exit_code=$PLAN_EXIT" >> $GITHUB_OUTPUT
          set -e

      - name: Export plan JSON
        if: always()
        run: |
          if [ -f plan.out ]; then
            terraform show -no-color -json plan.out > plan.json
          else
            echo '{"planned_values":{}}' > plan.json
          fi

      - name: Upload drift logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drift-logs-v2
          path: |
            ${{ env.ENV_ROOT }}/plan.txt
            ${{ env.ENV_ROOT }}/.terraform.lock.hcl

      - name: Upload drift plan JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drift-plan-json-v2
          path: ${{ env.ENV_ROOT }}/plan.json
